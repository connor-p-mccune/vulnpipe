# One-command lab run: a ZAP daemon plus the scanner.
#
#   ZAP_API_KEY=changeme docker compose -f docker/docker-compose.yml up --build
#
# Provide secrets via the environment / an .env file (see .env.example). The
# scanner only runs against in-scope targets and requires --authorized.

services:
  zap:
    # Verify the tag before pinning. Currently: stable.
    image: ghcr.io/zaproxy/zaproxy:stable
    command: >
      zap.sh -daemon -host 0.0.0.0 -port 8080
      -config api.key=${ZAP_API_KEY:?set ZAP_API_KEY}
      -config api.addrs.addr.name=.*
      -config api.addrs.addr.regex=true
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 10

  scanner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      zap:
        condition: service_healthy
    environment:
      ZAP_API_KEY: ${ZAP_API_KEY:?set ZAP_API_KEY}
      NVD_API_KEY: ${NVD_API_KEY:-}
      APP_USERNAME: ${APP_USERNAME:-}
      APP_PASSWORD: ${APP_PASSWORD:-}
    volumes:
      - ../configs:/app/configs:ro
      - ../results:/app/results
    # Edit configs/targets.yaml first; --authorized acknowledges scope ownership.
    command: ["scan", "--config", "configs/targets.yaml", "--authorized"]
