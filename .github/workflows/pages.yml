# Publish the sample HTML report to GitHub Pages so a reader can view real
# vulnpipe output in their browser without cloning or running anything.
#
# One-time setup: repo Settings -> Pages -> "Build and deployment" -> Source:
# "GitHub Actions". The deployed URL is then https://<owner>.github.io/vulnpipe/.

name: Pages

on:
  push:
    branches: [main]
    paths:
      - "examples/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble the site from the sample report
        run: |
          mkdir -p site
          cp examples/sample-report.html site/index.html
          cp examples/sample-report.json site/sample-report.json
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
