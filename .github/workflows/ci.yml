# Continuous integration: the project's own quality gates.
#
# Runs lint + type checks, the unit suite across the supported Python versions,
# a CLI smoke test against the installed console script, and the integration
# suite (which needs the nmap binary on PATH). This enforces on every push / PR
# exactly the four gates the project requires locally: `ruff check`,
# `black --check`, `mypy vulnpipe`, and `pytest`.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy vulnpipe

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=vulnpipe --cov-report=xml --cov-report=term-missing --cov-fail-under=90
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  cli-smoke:
    name: cli smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      # Install the built package (not editable) so this exercises the real
      # console-script entry point and packaging, not just the source tree.
      - run: pip install .
      - name: Exercise the CLI end to end
        run: |
          set -euxo pipefail
          sample=examples/sample-report.json
          vulnpipe version
          for kind in config report policy sla false-positives; do
            vulnpipe schema "$kind" > /dev/null
          done
          vulnpipe validate -c configs/targets.lab.yaml
          # Every registered report format renders from the committed sample.
          for fmt in json html markdown csv prometheus sarif gitlab remediation vex cyclonedx; do
            vulnpipe report -i "$sample" -f "$fmt" > /dev/null
          done
          vulnpipe stats -i "$sample" > /dev/null
          vulnpipe stats -i "$sample" -f json > /dev/null
          vulnpipe explain -i "$sample" --index 1 > /dev/null
          vulnpipe explain -i "$sample" --index 1 -f json > /dev/null
          vulnpipe remediate -i "$sample" > /dev/null
          vulnpipe badge -i "$sample" > /dev/null
          # Serve the report and hit every route, then shut the server down.
          vulnpipe serve -i "$sample" --port 8137 &
          serve_pid=$!
          for _ in $(seq 1 40); do
            if curl -sf http://127.0.0.1:8137/healthz > /dev/null; then break; fi
            sleep 0.25
          done
          curl -sf http://127.0.0.1:8137/ > /dev/null
          curl -sf http://127.0.0.1:8137/api/findings > /dev/null
          curl -sf http://127.0.0.1:8137/api/summary > /dev/null
          curl -sf http://127.0.0.1:8137/api/remediation > /dev/null
          curl -sf http://127.0.0.1:8137/metrics > /dev/null
          [ "$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8137/nope)" = 404 ]
          kill "$serve_pid" || true
          # Import third-party reports and merge them with the sample.
          vulnpipe convert -i tests/fixtures/trivy_report.json --from trivy -o /tmp/trivy.json > /dev/null
          vulnpipe convert -i tests/fixtures/grype_report.json --from grype > /dev/null
          vulnpipe merge -i "$sample" -i /tmp/trivy.json > /dev/null
          # Baseline / diff / gate / SLA / trend.
          vulnpipe baseline -i "$sample" -o /tmp/baseline.json --track-age
          vulnpipe sla --current "$sample" --baseline /tmp/baseline.json --critical-days 7 --high-days 30
          vulnpipe diff --baseline "$sample" --current "$sample"
          vulnpipe gate --current "$sample" --baseline /tmp/baseline.json --gate-severity critical
          vulnpipe trend "$sample" > /dev/null
          vulnpipe trend "$sample" -f html > /dev/null

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install nmap (required by the integration smoke test)
        run: sudo apt-get update && sudo apt-get install -y nmap
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -m integration
