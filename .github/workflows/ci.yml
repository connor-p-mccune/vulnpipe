# Continuous integration: the project's own quality gates.
#
# Runs lint + type checks, the unit suite across the supported Python versions,
# and the integration suite (which needs the nmap binary on PATH). This enforces
# on every push / PR exactly the four gates the project requires locally:
# `ruff check`, `black --check`, `mypy vulnpipe`, and `pytest`.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy vulnpipe

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run tests with coverage
        run: pytest --cov=vulnpipe --cov-report=xml --cov-report=term-missing --cov-fail-under=90
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration:
    name: integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install nmap (required by the integration smoke test)
        run: sudo apt-get update && sudo apt-get install -y nmap
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -m integration
