# Publish vulnpipe to PyPI on a version tag, using PyPI Trusted Publishing
# (OIDC) -- no API token stored in the repo.
#
# One-time setup on PyPI: create the "vulnpipe" project's trusted publisher for
# this repository and the workflow filename `publish.yml`, and create a GitHub
# environment named `pypi`. Then push a tag, e.g. `git tag v0.1.0 && git push --tags`.

name: Publish

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - name: Check the built metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/vulnpipe
    permissions:
      id-token: write # trusted publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
