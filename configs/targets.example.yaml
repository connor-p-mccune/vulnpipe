# vulnpipe example target/scope configuration.
#
# Copy to configs/targets.yaml (gitignored) and edit. Secrets are referenced by
# environment-variable NAME and resolved at scan time -- never put credentials or
# API keys in this file. Non-secret values may use ${ENV_VAR} / ${ENV_VAR:-default}
# substitution.
#
# A scan only runs with `vulnpipe scan --config <file> --authorized`, and every
# target below must fall inside `scope`.

# Authorization allowlist. Nothing outside this is ever scanned.
scope:
  hosts:
    - "10.0.0.0/24"          # IPs and CIDRs (network scope)
    - "192.168.56.0/24"
    - "*.lab.example.com"    # wildcard hostname (also matches lab.example.com)
  urls:
    - "https://app.lab.example.com"   # full http(s) URL prefixes (web scope)

targets:
  # Network-only target: an in-scope CIDR handed straight to Nmap.
  - name: internal-net
    host: "10.0.0.0/24"

  # Web + host target with authenticated ZAP scanning.
  #
  # The optional `auth` block keeps the active scan logged in (a major
  # false-positive reducer). Three schemes are supported; credentials are always
  # referenced by environment-variable NAME and resolved at scan time. Pick one:
  #
  #   # header / JWT bearer -- a token injected on every request:
  #   auth:
  #     type: header
  #     header_name: "Authorization"   # default; any header name works
  #     token_env: "API_BEARER_TOKEN"  # value read from $API_BEARER_TOKEN
  #     token_prefix: "Bearer "        # prepended to the token (use "" for none)
  #
  #   # script-based -- a ZAP auth script already loaded into the daemon:
  #   auth:
  #     type: script
  #     script_name: "jwt-login.js"
  #     script_engine: "Oracle Nashorn"
  #     parameters: { loginUrl: "https://app.lab.example.com/api/auth" }
  #     username_env: "APP_USERNAME"   # optional; creates a ZAP user when set
  #     password_env: "APP_PASSWORD"
  - name: web-app
    host: "10.0.0.10"
    urls:
      - "https://app.lab.example.com"
    auth:
      type: form
      login_url: "https://app.lab.example.com/login"
      username_field: "email"
      password_field: "password"
      username_env: "APP_USERNAME"   # value read from $APP_USERNAME at scan time
      password_env: "APP_PASSWORD"   # value read from $APP_PASSWORD at scan time
      logged_in_indicator: "Log out"
      logged_out_indicator: "Login"

# --- Scanner / pipeline settings (all optional; defaults shown) ---------------

nmap:
  timing_template: 4          # nmap -T0..-T5
  top_ports: 1000
  scripts: ["vulners"]        # CVE-tagging NSE script(s)
  timeout_seconds: 1800

zap:
  # Defaults to localhost for a local daemon; the docker-compose stack sets
  # ZAP_API_URL=http://zap:8080 so the same file works inside the container network.
  api_url: "${ZAP_API_URL:-http://localhost:8080}"
  api_key_env: "ZAP_API_KEY"
  spider_max_duration_minutes: 5
  active_scan_timeout_seconds: 3600
  max_concurrency: 1          # ZAP active scans are heavy; keep this low

enrichment:
  nvd_enabled: true
  nvd_api_key_env: "NVD_API_KEY"
  epss_enabled: true
  kev_enabled: true           # cross-reference CVEs against the CISA KEV catalog
  cache_dir: ".cache"

run:
  max_workers: 10             # bounded thread pool for the network layer

# --- Supply-chain analysis (optional) -----------------------------------------
# Analyze CycloneDX SBOMs for known-vulnerable components (OSV.dev) alongside the
# network/web scan; the findings enrich, dedup, prioritize, and gate like any
# other. SBOM files are local artifacts, so they are NOT subject to the scope
# allowlist (nothing is probed). A file that cannot be read is skipped with a
# warning. For a standalone SBOM-only run, use `vulnpipe sbom` instead.
# sbom:
#   - "sbom/app.cdx.json"
#   - "sbom/api.cdx.json"

# --- Prioritization (optional) ------------------------------------------------
# Rank findings on more business-critical assets higher. The first matching rule
# wins, so list more specific entries first; a host matching no rule uses
# `default_criticality`.
prioritization:
  default_criticality: medium   # one of: low, medium, high, critical
  assets:
    - host: "10.0.0.10"         # the web-app host is business-critical
      criticality: critical
    - host: "10.0.0.0/24"       # the rest of the internal range
      criticality: high
