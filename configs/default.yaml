# Base scanner/pipeline defaults.
#
# This file documents the default settings only. It is NOT a standalone run
# config (it intentionally omits `scope` and `targets`, which are required and
# live in a targets file such as configs/targets.example.yaml).

nmap:
  enabled: true
  binary: "nmap"
  timing_template: 4
  top_ports: 1000
  scripts: ["vulners"]
  timeout_seconds: 1800
  extra_args: []

zap:
  enabled: true
  api_url: "http://localhost:8080"
  api_key_env: "ZAP_API_KEY"
  spider_max_duration_minutes: 5
  active_scan_timeout_seconds: 3600
  max_concurrency: 1

nuclei:
  enabled: false               # opt-in: template-based CVE / misconfiguration checks (nuclei)
  binary: "nuclei"
  templates: []                # -t values (dirs / template ids); empty = nuclei's defaults
  severities: []               # e.g. ["medium", "high", "critical"]; empty = all
  rate_limit: null             # requests/second cap (nuclei -rate-limit); null = nuclei default
  timeout_seconds: 1800
  extra_args: []

enrichment:
  nvd_enabled: true
  nvd_api_key_env: "NVD_API_KEY"
  epss_enabled: true
  kev_enabled: true            # flag CVEs in the CISA Known Exploited Vulnerabilities catalog
  cache_dir: ".cache"

run:
  max_workers: 10

prioritization:
  default_criticality: medium     # one of: low, medium, high, critical
  # Each asset rule may add an optional `owner` (team/queue) and `tags` for routing.
  assets: []                      # e.g. [{ host: "10.0.0.10", criticality: critical, owner: "team-web" }]
