name: vulnpipe
description: >-
  Run the vulnpipe network + web vulnerability scanning pipeline and gate CI on newly
  introduced severe findings. Detection and reporting only -- it wraps existing
  scanners and reports their findings; it contains no exploit code.
author: Connor McCune
branding:
  icon: shield
  color: purple

inputs:
  config:
    description: Path to the YAML targets/scope configuration.
    required: true
  authorized:
    description: >-
      Set to "true" to acknowledge you are authorized to scan every in-scope target.
      The scan refuses to start otherwise.
    required: false
    default: "false"
  gate-severity:
    description: Fail the job on a new finding at or above this severity.
    required: false
    default: high
  gate-risk-score:
    description: Also fail on a new finding with a composite risk score at or above this (0-100; empty to skip).
    required: false
    default: ""
  policy:
    description: >-
      Gate-policy YAML (severity budgets, KEV block, risk threshold). When set it
      decides the verdict instead of gate-severity / gate-risk-score.
    required: false
    default: ""
  baseline:
    description: Baseline file to diff and gate against (optional; gate only on regressions).
    required: false
    default: ""
  false-positives:
    description: False-positive allowlist YAML to apply (optional).
    required: false
    default: ""
  output-dir:
    description: Directory for scan artifacts (the canonical JSON is written here).
    required: false
    default: results
  sarif:
    description: Path to also write a SARIF report for code scanning (empty to skip).
    required: false
    default: results/vulnpipe.sarif
  markdown:
    description: Path to also write a Markdown report, e.g. for a job summary (empty to skip).
    required: false
    default: ""
  html:
    description: Path to also write a self-contained HTML report (empty to skip).
    required: false
    default: ""
  vex:
    description: Path to also write an OpenVEX document (empty to skip).
    required: false
    default: ""
  junit:
    description: Path to also write a JUnit gate report for CI test reporting (empty to skip).
    required: false
    default: ""
  python-version:
    description: Python version to set up for the run.
    required: false
    default: "3.12"

outputs:
  report:
    description: Path to the canonical JSON findings report.
    value: ${{ inputs.output-dir }}/latest.json
  sarif:
    description: Path to the SARIF report (if written).
    value: ${{ inputs.sarif }}

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install vulnpipe
      shell: bash
      run: pip install "$GITHUB_ACTION_PATH"

    - name: Run vulnpipe scan
      shell: bash
      env:
        # Inputs are passed through the environment (never interpolated into the
        # script body) so untrusted values cannot inject shell commands.
        VP_CONFIG: ${{ inputs.config }}
        VP_OUTPUT: ${{ inputs.output-dir }}
        VP_AUTHORIZED: ${{ inputs.authorized }}
        VP_GATE: ${{ inputs.gate-severity }}
        VP_GATE_RISK: ${{ inputs.gate-risk-score }}
        VP_POLICY: ${{ inputs.policy }}
        VP_BASELINE: ${{ inputs.baseline }}
        VP_FALSE_POSITIVES: ${{ inputs.false-positives }}
        VP_SARIF: ${{ inputs.sarif }}
        VP_MARKDOWN: ${{ inputs.markdown }}
        VP_HTML: ${{ inputs.html }}
        VP_VEX: ${{ inputs.vex }}
        VP_JUNIT: ${{ inputs.junit }}
      run: |
        set -euo pipefail
        args=(scan --config "$VP_CONFIG" --output "$VP_OUTPUT" --gate-severity "$VP_GATE")
        if [ "$VP_AUTHORIZED" = "true" ]; then args+=(--authorized); fi
        if [ -n "$VP_GATE_RISK" ]; then args+=(--gate-risk-score "$VP_GATE_RISK"); fi
        if [ -n "$VP_POLICY" ]; then args+=(--policy "$VP_POLICY"); fi
        if [ -n "$VP_BASELINE" ]; then args+=(--baseline "$VP_BASELINE"); fi
        if [ -n "$VP_FALSE_POSITIVES" ]; then args+=(--false-positives "$VP_FALSE_POSITIVES"); fi
        if [ -n "$VP_SARIF" ]; then args+=(--sarif "$VP_SARIF"); fi
        if [ -n "$VP_MARKDOWN" ]; then args+=(--markdown "$VP_MARKDOWN"); fi
        if [ -n "$VP_HTML" ]; then args+=(--html "$VP_HTML"); fi
        if [ -n "$VP_VEX" ]; then args+=(--vex "$VP_VEX"); fi
        if [ -n "$VP_JUNIT" ]; then args+=(--junit "$VP_JUNIT"); fi
        vulnpipe "${args[@]}"
